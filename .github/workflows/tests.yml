name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup script smoke (Windows PowerShell)
        if: runner.os == 'Windows'
        run: .\scripts\setup.ps1

      - name: Setup script smoke (macOS/Linux)
        if: runner.os != 'Windows'
        run: bash scripts/setup.sh

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall -q src tests scripts

      - name: Public-safe content scan
        run: python scripts/public_safe_scan.py

      - name: Terminology check
        run: python scripts/check_terms.py

      - name: Tests
        run: python -m pytest -q

      - name: Agent config check
        run: python scripts/generate_agent_configs.py --check

      - name: CLI smoke
        run: |
          multi-agent-brief version
          multi-agent-brief run examples/basic_market_brief/input --output output/basic_market_brief

  non-dev-smoke:
    name: Non-dev install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install without dev extras
        run: python -m pip install -e .

      - name: Version check
        run: multi-agent-brief version

      - name: Init workspace
        run: |
          multi-agent-brief init /tmp/mabw-ci-smoke \
            --language zh-CN \
            --company "CI Test" \
            --industry manufacturing \
            --title "Smoke Brief" \
            --audience management \
            --source-profile conservative
          echo "- Manufacturing output improved as supply chain disruption eased in the latest reporting period." > /tmp/mabw-ci-smoke/input/smoke.md

      - name: Run pipeline
        run: multi-agent-brief run --config /tmp/mabw-ci-smoke/config.yaml

      - name: Assert output quality
        shell: bash
        run: |
          grep -q '\[src:' /tmp/mabw-ci-smoke/output/brief.md
          python -c "import json,sys; d=json.load(open('/tmp/mabw-ci-smoke/output/claim_ledger.json')); assert len(d)>0, 'claim_ledger empty'; print(f'claim_ledger has {len(d)} entries')"

  llm-decide-smoke:
    name: llm_decide + doctor + sources decide smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Init llm_decide workspace
        run: |
          multi-agent-brief init /tmp/mabw-llm \
            --language en-US \
            --company "Sample Company" \
            --industry manufacturing \
            --source-profile llm_decide

      - name: Doctor check
        run: multi-agent-brief doctor --config /tmp/mabw-llm/config.yaml

      - name: Sources decide (template)
        run: multi-agent-brief sources decide --config /tmp/mabw-llm/config.yaml

      - name: Assert source_candidates.yaml exists
        run: test -s /tmp/mabw-llm/source_candidates.yaml

      - name: Add input and run pipeline
        run: |
          echo "- Manufacturing sector grew 5 percent." > /tmp/mabw-llm/input/smoke.md
          multi-agent-brief run --config /tmp/mabw-llm/config.yaml

      - name: Assert output
        run: |
          test -s /tmp/mabw-llm/output/brief.md
          test -s /tmp/mabw-llm/output/claim_ledger.json

  onboarding-smoke:
    name: Onboarding (--from-onboarding) smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Create onboarding.json
        run: |
          cat > /tmp/onboarding.json << 'JSON'
          {
            "target": "/tmp/mabw-onboarding",
            "company_or_org": "Sample Company",
            "industry_or_theme": "manufacturing",
            "audience_plain": "management team",
            "source_style_plain": "reliable research",
            "language_plain": "English",
            "cadence_plain": "weekly",
            "must_watch": ["policy", "competitors", "market"]
          }
          JSON

      - name: Init from onboarding
        run: multi-agent-brief init --from-onboarding /tmp/onboarding.json

      - name: Doctor check
        run: multi-agent-brief doctor --config /tmp/mabw-onboarding/config.yaml

      - name: Run pipeline
        run: |
          echo "- Manufacturing output improved." > /tmp/mabw-onboarding/input/smoke.md
          multi-agent-brief run --config /tmp/mabw-onboarding/config.yaml

      - name: Assert output
        run: |
          test -s /tmp/mabw-onboarding/output/brief.md
          test -s /tmp/mabw-onboarding/output/claim_ledger.json
          test -s /tmp/mabw-onboarding/output/audit_report.json
          test -s /tmp/mabw-onboarding/output/source_map.md

  docx-smoke:
    name: DOCX output smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with docx extra
        run: python -m pip install -e ".[dev,docx]"

      - name: Init demo workspace
        run: multi-agent-brief init /tmp/mabw-docx --demo --force

      - name: Enable docx in config
        shell: python
        run: |
          from pathlib import Path
          p = Path("/tmp/mabw-docx/config.yaml")
          s = p.read_text(encoding="utf-8")
          if "docx" not in s:
              s = s.replace('    - "markdown"\n', '    - "markdown"\n    - "docx"\n')
              p.write_text(s, encoding="utf-8")

      - name: Run pipeline
        run: multi-agent-brief run --config /tmp/mabw-docx/config.yaml

      - name: Assert brief.docx exists
        run: test -s /tmp/mabw-docx/output/brief.docx

  readme-check:
    name: README update check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check README updated with source changes
        if: github.event_name == 'pull_request'
        run: python scripts/check_readme_updated.py --base origin/main

      - name: Check README updated with source changes
        if: github.event_name == 'push'
        run: python scripts/check_readme_updated.py --base "${{ github.before }}"
