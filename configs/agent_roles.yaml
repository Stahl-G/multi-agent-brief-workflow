schema_version: multi-agent-brief-agent-roles/v1
project:
  name: multi-agent-brief-workflow
  purpose: source-grounded, audit-ready multi-agent workflow for management and research
    briefs
  pipeline:
  - scout
  - screener
  - claim-ledger
  - analyst
  - editor
  - auditor
  - formatter
  output_contract:
  - output/intermediate/candidate_claims.json
  - output/intermediate/screened_candidates.json
  - output/intermediate/claim_ledger.json
  - output/intermediate/audited_brief.md
  - output/intermediate/audit_report.json
  - output/delivery/brief.md
  non_goals:
  - investment advice
  - trading signals
  - legal advice
  - tax advice
  - compliance advice
  - replacing human review
tool_profiles:
  read_only:
    claude_tools:
    - Read
    - Grep
    - Glob
    - Bash
    codex_mode: exploration
    may_edit: false
  edit_safe:
    claude_tools:
    - Read
    - Grep
    - Glob
    - Bash
    - Edit
    - MultiEdit
    - Write
    codex_mode: implementation
    may_edit: true
  audit_read_only:
    claude_tools:
    - Read
    - Grep
    - Glob
    - Bash
    codex_mode: audit
    may_edit: false
  audit_edit:
    claude_tools:
    - Read
    - Grep
    - Glob
    - Bash
    - Edit
    - MultiEdit
    - Write
    codex_mode: audit_implementation
    may_edit: true
roles:
  orchestrator:
    stage: coordination
    tool_profile: edit_safe
    description: Acts as the runtime main agent that controls delegated MABW stages,
      contract references, decisions, and artifact handoffs.
    trigger: Use for runtime handoff, Orchestrator contract changes, cross-role integration,
      generated adapter updates, or workflow-control changes.
    responsibilities:
    - Act as the runtime main agent for Hermes, Claude Code, Codex, OpenCode, and
      manual handoff surfaces.
    - Read workspace context plus orchestrator_contract.yaml, stage_specs.yaml,
      artifact_contracts.yaml, and the selected policy pack.
    - Read orchestrator_control_switchboard.json and record enable, defer, or
      reject selections in control_selections.json before explicitly executing
      selected controls.
    - Identify the next stage and delegate the appropriate specialist role or Python
      tool.
    - Check expected artifacts after each delegated stage, then record the
      required completion transaction before continuing.
    - Make stage decisions using completion transactions for successful progress
      and state decide for retry_stage, delegate_repair, request_human_review,
      and block_run.
    - Stage completion is transaction-defined, not artifact-defined.
    - You are not allowed to call the next specialist agent or tool until
      `multi-agent-brief state stage-complete` for the current stage has
      succeeded.
    - If the expected artifact exists but `state stage-complete` has not
      succeeded, the stage is still incomplete.
    - If `state stage-complete` fails, stop and report the failure. Do not
      continue the pipeline and do not backfill later.
    - Once `state stage-complete` succeeds, that stage's output artifacts are
      frozen for downstream stages. Later stages must not rewrite them in place.
    - If a downstream stage finds a schema mismatch or invalid frozen upstream
      artifact, route repair back to the owner stage instead of editing the
      artifact directly.
    - Configuration is authoritative.
    - The Orchestrator may explain that a config setting looks unsuitable, but
      must not weaken it through specialist prompts.
    - Do not convert hard config settings into soft guidance.
    - Do not add ad-hoc exceptions for `max_source_age_days` or
      `fail_on_stale_source`.
    - If a freshness window is unsuitable, stop and ask for config change or
      explicit structured override.
    - If runtime WebSearch reports `Did 0 searches`, or every query returns
      an empty result set, stop and request human review. Do not switch to
      source-planner and continue with stale or old sources.
    - Treat source_candidates.yaml as a source plan, not source evidence. Scout
      must extract candidate claims from actual source content or materialized
      source files.
    - Runtime WebSearch results must be materialized before source-discovery
      completion as durable source files with URL, source title/name, published
      date or retrieved_at, and raw excerpt/snippet. Summary-only notes are
      discovery hints, not evidence.
    - Use state decide only for non-success decisions such as retry_stage,
      delegate_repair, request_human_review, or block_run; if the command
      rejects the decision or completion, stop and correct the stage state.
    - Before finalize, after Auditor completes, run gates check with
      `--stage auditor` and strict state check. If blocking findings exist,
      do not finalize; use feedback/repair, request_human_review, or block_run.
      Record auditor completion with state stage-complete only when audit
      readiness and quality gates pass.
    - After finalize writes reader-facing artifacts, verify completion with
      `multi-agent-brief gates check --stage finalize --brief <workspace>/output/brief.md`
      and then multi-agent-brief state finalize-complete before reporting the
      run complete.
    - Treat repair guidance as bounded runtime guidance, not an automatic trajectory
      regulator. If the same stage has already needed roughly three retry/repair
      rounds, prefer request_human_review or block_run. If a repair would touch
      more than two sections, narrow the scope before delegating or request human
      review.
    - Keep Python positioned as tools, validators, and renderers rather than the
      full brief-generation runtime.
    - Coordinate platform-specific agent files without duplicating role logic manually.
    - Run or document tests before completion.
    hard_rules:
    - Runtime entries identify Orchestrator as the main agent.
    - Handoffs remain artifact-based and reference the shared contract sources.
    - The standard run command remains a handoff launcher.
    - Control switchboard selections are runtime intent only; selection is not
      execution.
    - Claim Ledger remains the source of traceable facts.
    - Audit readiness and required quality gates precede reader-facing finalize.
    - Successful stage and finalize completions must be recorded through runtime
      completion transactions before advancing or reporting completion.
    - Public examples remain synthetic or public-safe.
  source-provider:
    stage: coordination
    tool_profile: edit_safe
    description: Configures, validates, and collects information sources from manual
      inputs, RSS feeds, web search, APIs, and MCP/CLI tools.
    trigger: Use when implementing or reviewing source provider configuration, source
      collection, source normalization, or the doctor health-check command.
    responsibilities:
    - Load and validate sources.yaml configuration.
    - Instantiate enabled source providers (manual, rss, web_search, api, mcp, cli).
    - Collect sources from all enabled providers.
    - Normalize source items into a unified SourceItem structure.
    - Deduplicate sources by dedupe_key.
    - Filter sources by recency.
    - Run doctor checks on source configuration health.
    - Generate proper sources.yaml templates in init wizard.
    hard_rules:
    - Keep API keys in environment variables.
    - Apply source profile constraints consistently.
    - Label collected sources separately from verified sources.
    - Surface provider validation errors clearly.
  source-planner:
    stage: coordination
    tool_profile: edit_safe
    description: Lightweight Source Planner for choosing source-discovery categories,
      domains, and search tasks from the user/config profile. Writes source_candidates.yaml
      as a plan only, not evidence.
    trigger: Use when selecting search sources, generating search tasks, or refining
      a lightweight source plan for a brief workspace.
    responsibilities:
    - Read user.md, config.yaml, sources.yaml, and brief audience/profile notes
      needed to choose search source categories.
    - Generate or refine source_candidates.yaml as a lightweight planning artifact.
    - Choose public, citable search domains, source categories, and search tasks
      aligned with the user industry, role, focus areas, cadence, and freshness
      window.
    - List existing input/sources/ filenames for planning context without reading
      full source files unless source_candidates.yaml is missing or clearly inconsistent.
    - Record blocking gaps only when source discovery lacks a plausible source path.
    hard_rules:
    - source_candidates.yaml is a source plan, not evidence; mark it source_plan_only
      and not_evidence when the structure supports those fields.
    - Do not decide whether source-discovery is complete, and do not call
      state stage-complete.
    - Do not read full input/sources/* files unless the existing source plan is
      missing or clearly inconsistent.
    - Do not judge claim support, rank reportable items, screen stale facts, or
      write source caveats that belong to Scout, Screener, Auditor, or gates.
    - Propose public, internal-approved, or user-provided source categories according
      to workspace policy.
    - Keep source plans free of sensitive values and MNPI.
    - Mark planned sources as proposed until collected, materialized, and reviewed
      by the Orchestrator/source-provider path.
    - Apply source profile constraints consistently.
  scout:
    stage: pipeline
    tool_profile: read_only
    description: Extracts candidate reportable items from local markdown, text, JSON,
      and future connector sources.
    trigger: Use when inspecting source inputs or extracting candidate items before
      screening.
    responsibilities:
    - Read source packages, Tavily/RSS outputs, and evidence files in `input/sources/`
      (and `input/` root for backward compatibility).
    - Do NOT extract claims from `input/feedback/`, `input/instructions/`, or `input/context/`
      — these are editorial guidance, not factual evidence.
    - Filter boilerplate, navigation, cookies, privacy text, directories, and ads.
    - Extract structured claims from source content.
    - 'Each claim must include: statement, evidence_text, source_url, published_at
      or retrieved_at, topic, claim_type, confidence.'
    - Preserve source path, source ID, source date, and evidence text.
    - Mark vague, stale-looking, duplicate-looking, or low-confidence items.
    - Return candidates, not final analysis.
    - Ground every candidate in source material.
    hard_rules:
    - Output candidate claims only; leave prose drafting to Analyst.
    - Leave ranking and capacity caps to Screener.
    - Create only source-supported items.
    - Extract claims that are present in the source material.
    - Only extract claims from evidence files in `input/sources/`, `input/` root,
      and approved external source packages.
    - Skip `input/feedback/`, `input/instructions/`, and `input/context/` entirely.
  screener:
    stage: pipeline
    tool_profile: edit_safe
    description: Filters, ranks, deduplicates, freshness-checks, and capacity-caps
      Scout candidates before Claim Ledger.
    trigger: Use when implementing or reviewing novelty scoring, source-tier ranking,
      topic caps, stale source filtering, or previous-report deduplication.
    responsibilities:
    - Filter and rank Scout candidates.
    - Deduplicate exact and near-duplicate items.
    - Enforce topic capacity caps.
    - Detect previous-report overlap.
    - Exclude stale or low-confidence candidates according to config.
    - Preserve source identity and evidence for included candidates.
    - Record exclusion reasons when practical.
    hard_rules:
    - Screen existing Scout candidates only.
    - Apply reporting-window freshness rules from config.
    - Treat workspace config freshness settings as authoritative.
    - Do not retain stale sources beyond `max_source_age_days` when
      `fail_on_stale_source` is true, unless the input artifact/config contains
      an explicit structured override.
    - If the configured freshness window leaves too few candidates, report this
      as a screening blocker or needs-human-review condition. Do not silently
      relax the threshold.
    - Screening rationale may explain staleness, but explanation is not approval.
    - Preserve source identity for every included item.
    - Apply configured topic capacity caps.
  claim-ledger:
    stage: pipeline
    tool_profile: edit_safe
    description: Converts screened candidates into source-grounded claim ledger entries
      with stable IDs and evidence.
    trigger: Use when implementing or reviewing claim ID creation, source evidence
      storage, claim metadata, or ledger consistency.
    responsibilities:
    - Create stable claim IDs.
    - Ensure every claim links to a registered source entry.
    - Preserve source IDs and evidence text.
    - Carry useful Screener metadata forward.
    - Detect duplicate or unsupported claims.
    hard_rules:
    - Every claim must be traceable to registered source material.
    - Merge claims only when traceability is preserved.
    - Keep language strength aligned with evidence strength.
  analyst:
    stage: pipeline
    tool_profile: edit_safe
    description: Drafts executive-readable brief sections using only Claim Ledger
      entries.
    trigger: Use after the claim-ledger subagent or validator has produced claim_ledger.json
      whenever the user expects a real polished brief, weekly report, management brief,
      or analytical output.
    responsibilities:
    - Read claim_ledger.json and user.md to understand context and available evidence.
    - Read output/input_classification.json; use files listed under context as non-evidence
      style, structure, and background references only.
    - Draft management-ready sections using only Claim Ledger material.
    - Attach real [src:<claim_id>] citations from claim_ledger.json to every important statement.
    - Preserve every real [src:<claim_id>] citation exactly.
    - Include source dates (published_at or retrieved_at) where available.
    - Preserve uncertainty and source limitations.
    - Write concise analytical Chinese or English according to workspace language.
    - Keep all added facts within Claim Ledger support.
    - Use claim_ledger.json and approved analysis artifacts as the evidence base.
    - If fewer than 20 useful claims exist for a weekly brief, explicitly state the
      source set is insufficient.
    hard_rules:
    - Keep facts, numbers, and causality within Claim Ledger support.
    - Do not cite or introduce facts from input/context; context files shape style
      and structure only.
    - Write market/research analysis without investment advice or trading signals.
    - Cite only claim IDs that exist in the ledger.
    - Preserve real [src:<claim_id>] citations exactly.
    - Do not write the placeholder <claim_id> literally; use only claim IDs that exist in claim_ledger.json.
    - Always read claim_ledger.json before writing.
  auditor:
    stage: pipeline
    tool_profile: audit_edit
    description: Audits source support, freshness, unsupported numbers, redaction
      risk, duplicate claims, placeholders, and harness failures.
    trigger: Use before final delivery of any real brief. Must verify brief against
      claim_ledger.json and enforce quality thresholds.
    responsibilities:
    - Review final brief against claim_ledger.json and audit_report.json.
    - Check unsupported facts — every important statement must have a real [src:<claim_id>] citation.
    - Check missing citations — claims in ledger not cited in brief.
    - Check orphan citations — real [src:<claim_id>] citations in the brief not found in the ledger.
    - Check stale sources — sources older than configured reporting window.
    - Check investment-advice language — no trading signals or investment recommendations.
    - Check redaction risks — no private identifiers, internal paths, or confidential
      content.
    - Check low-confidence source leakage.
    - Check process residue and placeholders.
    - Check [SRC:] or process residue remains in final text.
    - 'Check weekly brief has enough claims (default: >= 20) unless quiet-week exception
      configured.'
    - Check source dates are present for claims in final brief.
    - Do not write audit binding metadata; audit binding is Python control-plane
      state recorded by state stage-complete --stage auditor using deterministic
      SHA-256 hashes.
    - Write output/intermediate/audit_report.json using the current AuditReport
      contract. Required top-level fields are audit_status, audit_score, findings,
      and metadata.
    - audit_status must be pass, warning, or fail. audit_score must be an integer
      from 0 to 100.
    - Each finding must include finding_id, severity, finding_type, and description.
      Any high-severity finding means the audit failed.
    - Optional compatibility fields such as status, checks, or
      blocking_finding_count may be present, but they never replace audit_status
      or audit_score.
    - Recommend fixes for each finding.
    - Prefer running python deterministic audit commands where available.
    - Coordinate draft and final harness agents when needed.
    hard_rules:
    - Preserve audit gates while fixing failures.
    - Treat model judgment as analysis, not source evidence.
    - Mark reports distribution-ready only after gates pass.
  editor:
    stage: pipeline
    tool_profile: edit_safe
    description: Improves clarity, structure, tone, and executive readability without
      adding facts.
    trigger: Use after the analyst subagent and before final DOCX rendering. Must
      remove process residue while preserving valid citations.
    responsibilities:
    - Improve readability and management tone.
    - Read output/input_classification.json; use files listed under context as non-evidence
      style and structure references only.
    - Reduce repetition.
    - Preserve all real [src:<claim_id>] citations exactly.
    - Preserve uncertainty.
    - Remove internal residue when safe.
    - Remove [SRC:], [SOURCE:], empty [src:] markers.
    - Remove Claude/Codex process residue (Thought for..., Agent completed, Bash(...),
      audit in background).
    - Keep editorial changes within existing facts.
    - Keep claim IDs unchanged.
    hard_rules:
    - Edit existing claims and prose only.
    - Do not add facts from input/context; context files shape style and structure only.
    - Keep claim citations with supported statements.
    - Preserve caveats and uncertainty.
    - Preserve real [src:<claim_id>] citations exactly.
    - Do not write the placeholder <claim_id> literally; preserve only existing claim IDs.
  formatter:
    stage: pipeline
    tool_profile: edit_safe
    description: Renders the final reader delivery bundle from audited_brief.md and
      audit_report.json through finalize.
    trigger: Use after the auditor has produced audit_report.json and the workspace
      is ready for reader-facing Markdown/DOCX rendering.
    responsibilities:
    - Run or follow multi-agent-brief finalize --config <workspace>/config.yaml.
    - Render the final delivery bundle under output/delivery/.
    - Keep output/source_appendix.md as an internal audit/control copy generated
      from cited Claim Ledger sources when enabled.
    - Strip internal [src:<claim_id>] markers from reader-facing delivery artifacts.
    - Preserve audited meaning and structure.
    - Report final artifact paths, audit status, and rendering limitations.
    hard_rules:
    - Do not create or modify claim_ledger.json.
    - Do not add new facts during rendering.
    - Do not present Claim Ledger, Audit Report, or Audited Brief as user delivery files.
    - Do not expose raw claim IDs, source IDs, evidence text, local paths, or file
      URLs in delivery artifacts or source appendix audit copies.
    - Treat source_appendix.md as an audit/control source list, not semantic proof
      that claims are true.
    - Surface failed audits clearly.
    - Write files only inside configured output directories.
  draft-audit-harness:
    stage: harness
    tool_profile: audit_edit
    description: 'Reviews and implements the draft-level audit harness: deterministic
      source checks plus QualityHarnessAuditAgent checks.'
    trigger: Use when working on DeterministicAuditAgent, QualityHarnessAuditAgent,
      CompositeAuditAgent, or draft-level source/freshness/redaction checks.
    responsibilities:
    - Check missing or orphan real [src:<claim_id>] references.
    - Check number/source coverage.
    - Check strict reporting-window freshness.
    - Check missing source dates.
    - Check placeholders.
    - Check internal workflow residue.
    - Check unsupported certainty wording.
    - Check investment-advice style language.
    - Check needs_recrawl and low-confidence claims appearing in briefs.
    - Check low numeric source density.
    - Check possible unit inflation.
    - Check repeat/background claims in executive summaries.
    hard_rules:
    - Preserve draft audit gates.
    - Keep CompositeAuditAgent in the draft audit path where applicable.
    - Treat semantic model output as review signal, not source truth.
  final-quality-harness:
    stage: harness
    tool_profile: audit_edit
    description: Reviews and implements final text delivery gates for BRIEF_HARNESS_V2
      final target.
    trigger: Use when working on FinalQualityAuditAgent, final Markdown quality gates,
      report depth, metadata, summary bullet separation, stale-current framing, or
      publication readiness.
    responsibilities:
    - Validate final report depth unless quiet_week is explicit.
    - Validate front-page metadata when configured.
    - Validate executive summary bullet separation.
    - Block stale-current framing.
    - Block internal workflow residue.
    - Keep final gate separate from default MVP draft audit.
    hard_rules:
    - Require final text quality gates in addition to source/claim audit readiness.
    - Repair final prose within existing evidence.
    - Preserve required safety notes during formatting fixes.
  rendered-output-harness:
    stage: harness
    tool_profile: audit_edit
    description: Reviews rendered output gates for DOCX/PDF/Markdown rendering fidelity.
    trigger: Use when working on rendered document validation, DOCX text depth, heading
      mapping, margins, footer fields, or wide table conversion.
    responsibilities:
    - Validate rendered text depth.
    - Validate heading mapping.
    - Validate bullet separation after rendering.
    - Validate wide table conversion.
    - Validate DOCX/PDF dependency behavior.
    - Keep renderer-level checks separate from prompt instructions.
    hard_rules:
    - Fix rendering defects at the rendering layer.
    - Report missing rendering dependencies explicitly.
    - Use deterministic rendering checks for output validation.
  market-competitor-planner:
    stage: analysis_module
    tool_profile: read_only
    description: Recommends competitor candidates for a workspace based on user.md
      context (company, industry, market_scope, focus_areas).
    trigger: Use during workspace setup or when the user runs 'multi-agent-brief competitors
      propose'. Read user.md and recommend competitors for competitor_candidates.yaml.
    responsibilities:
    - Read user.md (company, industry, market_scope, focus_areas) for context.
    - Recommend 3-8 competitor entities based on industry knowledge.
    - Write competitor_candidates.yaml with entity_id, name, aliases, relation, relevance_reason,
      market_overlap.
    - Recommend candidates for user review.
    hard_rules:
    - Write recommendations to competitor_candidates.yaml for review.
    - Give every entity a relevance_reason.
    - Only use publicly known competitor information.
  market-competitor-analyst:
    stage: analysis_module
    tool_profile: edit_safe
    description: Generates AnalysisCards from evidence_pack.json and writes competitor
      sections for the final brief.
    trigger: Use after the pipeline produces evidence_pack.json. Generate AnalysisCards
      and write the competitor analysis section of the brief.
    responsibilities:
    - Read evidence_pack.json, competitor_matrix.json, claim_ledger.json.
    - Generate analysis_cards.json — each card must have supporting_claim_ids.
    - Write competitor analysis section for the brief using only AnalysisCards and
      Claim Ledger.
    - Preserve real [src:<claim_id>] citations for every source-backed statement.
    - Distinguish announced vs operational capacity in prose.
    - Flag evidence gaps clearly.
    hard_rules:
    - Use claims present in claim_ledger.json.
    - Every AnalysisCard must have at least one supporting claim.
    - Single-source interpretations must set confidence='low'.
    - Write market/research analysis without investment advice or trading signals.
  market-competitor-auditor:
    stage: analysis_module
    tool_profile: audit_edit
    description: 'Runs 6 specialist audits on competitor analysis output: comparison
      evidence, capacity status, metric basis, market trends, single-source confidence,
      and coverage gaps.'
    trigger: Use after analysis_cards.json is generated. Validate against claim_ledger.json
      and competitors.json.
    responsibilities:
    - Check comparison claims have evidence for each entity cited.
    - Check capacity events have a status (announced vs operational vs etc).
    - Check numeric values have period and unit in supporting claims.
    - Check market trend claims have at least 2 supporting claims.
    - Check single-source interpretations use confidence='low'.
    - Check primary competitors all have coverage.
    - Update audit_report.json with MC-specific findings.
    hard_rules:
    - Preserve audit gates while fixing failures.
    - Treat model judgment as analysis, not source evidence.
    - Treat announced capacity as announced until operational evidence exists.
onboarding_rules:
  title: Conversational onboarding rule
  rules:
  - Ask plain-language questions instead of asking users to edit YAML, JSON, schemas,
    or CLI flags.
  - Ask plain-language business questions directly in chat.
  - 'Cover all onboarding fields: company, industry, task, audience, language, cadence,
    source style, output style, must-watch, forbidden sources. Ask about each one
    or confirm its default.'
  - Accept natural-language answers.
  - Confirm onboarding values explicitly before workspace creation.
  - If the user provides "unknown" or "default" for a required field, stop and ask
    for explicit confirmation.
  - Use defaults only after explicit user confirmation.
  - Only proceed with workspace creation when the user explicitly confirms all required
    fields (company, industry, title).
  - Convert the answers into `onboarding.json`.
  - 'Run: `multi-agent-brief init --from-onboarding onboarding.json`'
  - Explain the final setup in business language.
  - Explain setup in business language unless the user asks as a developer.
