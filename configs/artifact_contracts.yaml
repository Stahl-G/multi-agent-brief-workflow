schema_version: multi-agent-brief-artifact-contracts/v1
artifact_contract:
  status_values:
    - expected
    - missing
    - present
    - valid
    - invalid
    - blocked
  provenance_ready_fields:
    - artifact_id
    - path
    - producer_stage
    - producer_role
    - consumer_stages
    - validation_result
    - blocking_reason
    - allowed_decisions
    - retry_or_human_review_decision
artifacts:
  - artifact_id: source_candidates
    path: source_candidates.yaml
    format: yaml
    required: false
    producer_stage: source-discovery
    producer_role: source-planner
    consumer_stages:
      - scout
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - request_human_review
      - block_run
    retry_or_human_review_decision: request_human_review
  - artifact_id: input_classification
    path: input_classification.json
    format: json
    required: false
    producer_stage: input-governance
    producer_role: python_tool
    consumer_stages:
      - scout
      - analyst
      - editor
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - request_human_review
      - block_run
    retry_or_human_review_decision: retry_stage
  - artifact_id: candidate_claims
    path: output/intermediate/candidate_claims.json
    format: json
    required: true
    producer_stage: scout
    producer_role: scout
    consumer_stages:
      - screener
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - request_human_review
      - block_run
    retry_or_human_review_decision: retry_stage
  - artifact_id: screened_candidates
    path: output/intermediate/screened_candidates.json
    format: json
    required: true
    producer_stage: screener
    producer_role: screener
    consumer_stages:
      - claim-ledger
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - request_human_review
      - block_run
    retry_or_human_review_decision: retry_stage
  - artifact_id: claim_ledger
    path: output/intermediate/claim_ledger.json
    format: json
    required: true
    producer_stage: claim-ledger
    producer_role: claim-ledger
    consumer_stages:
      - analyst
      - auditor
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - request_human_review
      - block_run
    retry_or_human_review_decision: request_human_review
  - artifact_id: audited_brief
    path: output/intermediate/audited_brief.md
    format: markdown
    required: true
    producer_stage: analyst
    producer_role: analyst
    consumer_stages:
      - editor
      - auditor
      - finalize
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - delegate_repair
      - request_human_review
      - block_run
    retry_or_human_review_decision: delegate_repair
  - artifact_id: audit_report
    path: output/intermediate/audit_report.json
    format: json
    required: true
    producer_stage: auditor
    producer_role: auditor
    consumer_stages:
      - finalize
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - delegate_repair
      - request_human_review
      - block_run
    retry_or_human_review_decision: delegate_repair
  - artifact_id: reader_brief
    path: output/brief.md
    format: markdown
    required: true
    producer_stage: finalize
    producer_role: python_tool
    consumer_stages: []
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - finalize
      - request_human_review
      - block_run
    retry_or_human_review_decision: request_human_review
