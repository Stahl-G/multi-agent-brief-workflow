schema_version: multi-agent-brief-artifact-contracts/v1
artifact_contract:
  status_values:
    - expected
    - missing
    - present
    - valid
    - invalid
    - blocked
  provenance_ready_fields:
    - artifact_id
    - path
    - producer_stage
    - producer_role
    - consumer_stages
    - validation_result
    - blocking_reason
    - allowed_decisions
    - retry_or_human_review_decision
  producer_kind_values:
    - workflow_stage
    - control_tool
  edge_direction_notes:
    artifact_derived_from: "from is the derived/output artifact; to is the source/input artifact."
artifacts:
  - artifact_id: source_candidates
    path: source_candidates.yaml
    format: yaml
    required: false
    producer_stage: source-discovery
    producer_role: source-planner
    consumer_stages: []
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - request_human_review
      - block_run
    retry_or_human_review_decision: request_human_review
  - artifact_id: input_classification
    path: output/input_classification.json
    format: json
    required: false
    producer_stage: input-governance
    producer_role: python_tool
    consumer_stages:
      - scout
      - analyst
      - editor
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - request_human_review
      - block_run
    retry_or_human_review_decision: retry_stage
  - artifact_id: candidate_claims
    path: output/intermediate/candidate_claims.json
    format: json
    required: true
    producer_stage: scout
    producer_role: scout
    consumer_stages:
      - screener
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - request_human_review
      - block_run
    retry_or_human_review_decision: retry_stage
  - artifact_id: screened_candidates
    path: output/intermediate/screened_candidates.json
    format: json
    required: true
    producer_stage: screener
    producer_role: screener
    consumer_stages:
      - claim-ledger
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - request_human_review
      - block_run
    retry_or_human_review_decision: retry_stage
  - artifact_id: claim_ledger
    path: output/intermediate/claim_ledger.json
    format: json
    required: true
    producer_stage: claim-ledger
    producer_role: claim-ledger
    consumer_stages:
      - analyst
      - auditor
    validation_result: reference_only
    blocking_reason: ""
    allowed_decisions:
      - continue
      - retry_stage
      - request_human_review
      - block_run
    retry_or_human_review_decision: request_human_review
  - artifact_id: claim_drafts
