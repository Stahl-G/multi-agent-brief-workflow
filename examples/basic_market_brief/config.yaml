project:
  name: "Synthetic Market Brief Demo"
  language: "en-US"
  audience: "management"

report:
  date: "auto"
  max_source_age_days: 14
  fail_on_stale_source: true

input:
  path: "input"

output:
  path: "output"
  formats:
    - "markdown"
    - "docx"
  filename_template: "{project_name}_{report_date}"
  named_outputs: true
