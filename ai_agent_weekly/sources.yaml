source_strategy:
  profile: "llm_decide"
  decision_mode: "agent_decide"
  requires_agent_resolution: true
  optional_seed_pack: null
  enabled_providers:
    - "manual"
    - "web_search"
source_discovery:
  instruction: "Read user.md first for full user context (company, industry, role, task objective, focus areas, forbidden sources). Propose search intents and candidate sources based on user.md. Write source_candidates.yaml for user review before first ingestion."
  company: "米公司"
  industry: "互联网"
  role: "strategy_office"
  task_objective: "AI大模型和AGENT行业周报"
  audience: "management"
  focus_areas:
    - "company"
    - "industry"
    - "policy"
    - "competitors"
    - "risk_events"
    - "OpenAI"
    - "Anthropic"
    - "Google DeepMind"
    - "Meta"
    - "字节/豆包"
    - "阿里通义"
    - "月之暗面"
    - "智谱"
    - "Agent"
  cadence: "weekly"
  max_source_age_days: 14
  language: "zh"
  selection_goals:
    - "official company and peer company updates"
    - "regulator and policy sources"
    - "industry media"
    - "market data"
    - "customer or demand signals"
    - "competitor movements"
  source_requirements:
    - "prefer public, citable, timestamped sources"
    - "prefer sources with stable URLs or RSS feeds"
    - "avoid paywalled-only sources unless user provides access"
    - "avoid private, confidential, internal, or material non-public information"
    - "preserve source URL, source name, source tier, and published date"
  forbidden_sources:
    - "credentials"
    - "private emails"
    - "private chat logs"
    - "internal reports"
    - "customer names"
    - "confidential files"
    - "material non-public information"
  review_policy:
    require_user_confirmation_before_first_live_ingestion: true
    write_candidate_sources_to: "source_candidates.yaml"
manual:
  enabled: true
  sources:
    -
      name: "Local Input Directory"
      path: "input/"
      category: "local_files"
      language: "zh"
      enabled: true
rss:
  enabled: false
  feeds:
web_search:
  enabled: true
  mode: "configure_later"
  status: "unconfigured"
  max_results: 20
  recency_days: 7
  note: "Configure a search backend before running live retrieval."
api:
  enabled: false
  providers:
mcp:
  enabled: false
  servers:
filing_resolver:
  enabled: false
  tickers:

  filing_types:
    - "10-K"
    - "10-Q"
    - "8-K"
  xbrl: true
  note: "Disabled by default. Enable via 'multi-agent-brief sources decide --merge' after reviewing source_candidates.yaml filing_sources."
