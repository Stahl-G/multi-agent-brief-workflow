schema_version: multi-agent-brief-policy-pack/v1
policy_pack:
  name: default
  audience: workspace_default
  language: workspace_default
  cadence: workspace_default
  contract_categories:
    - behavior
    - process_artifact
    - fact_grounding_evidence
    - quality_audience
stage_overrides: {}
source_rules:
  source_style: workspace_default
  freshness: workspace_default
claim_rules:
  material_facts_require_claim_ledger: true
  preserve_uncertainty: true
delivery_rules:
  finalize_after_audit_readiness: true
  reader_output_strips_internal_citations: true
human_review_gates:
  - doctor_failed
  - missing_required_artifact
  - audit_failed
  - unsupported_material_fact
repair_limits:
  default_repair_mode: reference_only
  fact_change_requires_claim_update: true
v060_boundaries:
  runtime_state: deferred
  artifact_registry_execution: deferred
  feedback_repair_loop: deferred
v061_boundaries:
  runtime_state: minimum_control_files
  artifact_registry_execution: minimum_file_status_check
  feedback_repair_loop: deferred
v062_boundaries:
  feedback_issue_handling: minimum_control_files
  bounded_repair_planning: deterministic_control_plan
  automatic_repair_execution: deferred
  semantic_repair_verification: deferred
v063_boundaries:
  quality_gates: deterministic_control_report
  material_fact_gate: deterministic_claim_ledger_grounding
  freshness_gate: deterministic_existing_metadata_only
  target_relevance_gate: deterministic_workspace_context_check
  live_market_quote_fetching: deferred
  semantic_truth_judgment: deferred
  automatic_source_recrawl: deferred
v065_boundaries:
  provenance_projection: deterministic_control_projection
  semantic_truth_verification: deferred
  execution_replay: deferred
  graph_database_or_query_engine: deferred
