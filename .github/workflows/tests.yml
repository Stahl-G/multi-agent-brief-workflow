name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup script smoke (Windows PowerShell)
        if: runner.os == 'Windows'
        run: .\scripts\setup.ps1

      - name: Setup script smoke (macOS/Linux)
        if: runner.os != 'Windows'
        run: bash scripts/setup.sh

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Tests
        run: python -m pytest -q

      - name: Agent config check
        run: python scripts/generate_agent_configs.py --check

      - name: CLI smoke
        run: |
          multi-agent-brief version
          multi-agent-brief run examples/basic_market_brief/input --output output/basic_market_brief

  readme-check:
    name: README update check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check README updated with source changes
        if: github.event_name == 'pull_request'
        run: python scripts/check_readme_updated.py --base origin/main

      - name: Check README updated with source changes
        if: github.event_name == 'push'
        run: python scripts/check_readme_updated.py --base "${{ github.event.before }}"
